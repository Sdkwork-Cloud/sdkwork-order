name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: order
          POSTGRES_PASSWORD: order
          POSTGRES_DB: order_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U order -d order_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ORDER_TEST_POSTGRES_URL: postgres://order:order@localhost:5432/order_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify workspace
        run: pnpm verify
      - name: Postgres repository parity
        run: pnpm test:postgres:required
